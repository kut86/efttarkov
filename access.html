<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, users-scalable=no">
  <meta name="description" content="Управление доступом — Тактик">
  <title>Управление доступом — ЧВК</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="menu.css">
  <link rel="stylesheet" href="profile.css">
  <link rel="stylesheet" href="access.css">
</head>
<body>

<!-- Оверлей загрузки / авторизации -->
<div id="authOverlay" style="display:flex">
  <div class="auth-box">
    <div class="auth-logo">ЧВК</div>
    <div class="auth-sub">Проверка доступа...</div>
  </div>
</div>

<!-- Страница управления доступом -->
<div id="accessPage" style="display:none">

  <!-- Шапка -->
  <div class="profile-header">
    <a href="profile.html" class="btn btn-sm profile-back">← Профиль</a>
    <div class="profile-title">⚙️ УПРАВЛЕНИЕ ДОСТУПОМ</div>
  </div>

  <!-- Статистика -->
  <div class="access-stats">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">0</div>
      <div class="stat-label">Всего игроков</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statActive">0</div>
      <div class="stat-label">Активных</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statExpiring">0</div>
      <div class="stat-label">Истекает скоро</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statBanned">0</div>
      <div class="stat-label">Заблокировано</div>
    </div>
  </div>

  <!-- Фильтры -->
  <div class="access-filters">
    <input id="searchInput" type="text" placeholder="🔍 Поиск по нику или email">
    <select id="levelFilter">
      <option value="all">Все уровни</option>
      <option value="0">🪖 Standard</option>
      <option value="1">🎯 Left Behind</option>
      <option value="2">⚔️ Prepare for Escape</option>
      <option value="3">💀 Edge of Darkness</option>
      <option value="4">👁 Unheard </option>
    </select>
    <select id="statusFilter">
      <option value="all">Все статусы</option>
      <option value="active">✅ Активные</option>
      <option value="expiring">⚠️ Истекает скоро</option>
      <option value="expired">⛔ Истёкшие</option>
      <option value="banned">🔴 Заблокированные</option>
    </select>
  </div>

  <!-- Список пользователей -->
  <div id="usersList" class="access-users-list"></div>

</div>

<!-- ═══════════════════════════════════════════
     МОДАЛКА РЕДАКТИРОВАНИЯ ДОСТУПА
     ═══════════════════════════════════════════ -->
<div id="accessModal" class="access-modal-overlay" style="display:none" role="dialog"
     aria-modal="true" aria-labelledby="accessModalTitle">
  <div class="access-modal">

    <div class="access-modal-header">
      <div class="access-modal-title" id="accessModalTitle">Редактировать доступ</div>
      <button class="modal-close" id="accessModalClose" aria-label="Закрыть">✕</button>
    </div>

    <div class="access-modal-body">

      <!-- Инфо пользователя -->
      <div class="access-users-info">
        <img id="modalUsersAvatar" src="" alt="Аватар" class="access-modal-avatar">
        <div>
          <div id="modalUsersNick"   class="access-modal-nick"></div>
          <div id="modalUsersEmail"  class="access-modal-email"></div>
        </div>
      </div>

      <!-- Уровень доступа -->
      <div class="form-group">
        <label class="form-label">Уровень доступа</label>
        <div class="level-buttons" id="levelButtons">
          <button class="level-btn" data-level="0">
            <span class="level-icon">🪖</span>
            <span class="level-name">Standard</span>
            <span class="level-num">0</span>
          </button>
          <button class="level-btn" data-level="1">
            <span class="level-icon">🎯</span>
            <span class="level-name">Left Behind</span>
            <span class="level-num">1</span>
          </button>
          <button class="level-btn" data-level="2">
            <span class="level-icon">⚔️</span>
            <span class="level-name">Prepare for Escape</span>
            <span class="level-num">2</span>
          </button>
          <button class="level-btn" data-level="3">
            <span class="level-icon">💀</span>
            <span class="level-name">Edge of Darkness</span>
            <span class="level-num">3</span>
          </button>
          <button class="level-btn" data-level="4">
            <span class="level-icon">👁</span>
            <span class="level-name">Unheard</span>
            <span class="level-num">4</span>
          </button>
        </div>
      </div>

      <!-- Срок действия -->
      <div class="form-group">
        <label class="form-label">Срок действия</label>
        <div class="expiry-options">
          <button class="expiry-btn" data-days="0">∞ Бессрочно</button>
          <button class="expiry-btn" data-days="7">7 дней</button>
          <button class="expiry-btn" data-days="30">30 дней</button>
          <button class="expiry-btn" data-days="90">90 дней</button>
          <button class="expiry-btn" data-days="365">1 год</button>
        </div>
        <input id="expiryDate" type="date" style="margin-top:8px">
        <div class="profile-hint">Оставьте пустым для бессрочного доступа</div>
      </div>

      <!-- Заметка -->
      <div class="form-group">
        <label class="form-label">Заметка для админа</label>
        <input id="accessNote" type="text" placeholder="Например: оплата за декабрь">
      </div>

    </div><!-- /access-modal-body -->

    <div class="access-modal-footer">
      <button id="accessModalCancel" class="btn btn-sm">Отмена</button>
      <button id="accessModalSave"   class="btn btn-sm btn-primary">Сохранить</button>
    </div>

  </div>
</div>

<div id="toastContainer"></div>
<script type="module" src="access.js"></script>
</body>
</html>
