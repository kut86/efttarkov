<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Профиль — ЧВК</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="menu.css">
  <link rel="stylesheet" href="profile.css">
</head>
<body>

<div id="authOverlay" style="display:flex">
  <div class="auth-box">
    <div class="auth-logo">ЧВК</div>
    <div class="auth-sub">Загрузка профиля...</div>
  </div>
</div>

<div id="profilePage" style="display:none">

  <!-- Шапка -->
  <div class="profile-header">
    <a href="index.html" class="btn btn-sm profile-back">← Карта</a>
    <div class="profile-title">ПРОФИЛЬ</div>
  </div>

  <!-- Карточка профиля -->
  <div class="profile-card">
    <div class="profile-avatar-wrap">
      <img id="profileAvatar" src="" alt="avatar" class="profile-avatar">
      <div class="profile-avatar-placeholder" id="profileAvatarPlaceholder">👤</div>
    </div>

    <div class="profile-info">
      <div class="profile-nickname" id="profileNicknameDisplay">Сталкер</div>
      <div class="profile-email"    id="profileEmail"></div>
      <div class="profile-role"     id="profileRole"></div>
    </div>
  </div>

  <!-- Форма редактирования -->
  <div class="profile-section">
    <div class="profile-section-title">Настройки профиля</div>

    <div class="form-group">
      <label class="form-label">Никнейм <span style="color:var(--accent)">(макс. 20 символов)</span></label>
      <input id="nicknameInput" type="text" maxlength="20" placeholder="Введите никнейм">
      <div class="profile-hint">Только кириллица или латиница</div>
    </div>

    <div class="form-group">
      <label class="form-label">URL фото чвк</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="photoInput" type="url" placeholder="https://...">
        <button id="photoPreviewBtn" class="btn btn-sm">Просмотр</button>
      </div>
      <div class="profile-hint">Оставьте пустым чтобы использовать фото Google</div>
    </div>

    <div style="display:flex;gap:8px;margin-top:8px">
      <button id="saveProfileBtn" class="btn btn-primary">Сохранить</button>
      <button id="resetPhotoBtn"  class="btn btn-sm">Сбросить фото</button>
    </div>
  </div>

  <!-- Кнопка выхода -->
  <div class="profile-section">
    <button id="logoutBtn" class="btn btn-danger">Выйти из аккаунта</button>
  </div>

  <!-- Админ-панель (видна только админу) -->
  <div class="profile-section" id="adminPanel" style="display:none">
    <div class="profile-section-title" style="color:var(--accent)">⚙️ Администрирование</div>

    <div class="admin-search">
      <input id="adminSearch" type="text" placeholder="Поиск по никнейму или email">
    </div>

    <div id="usersList" class="users-list"></div>
  </div>

</div>

<div id="toastContainer"></div>

<script type="module" src="profile.js"></script>
</body>
</html>
